name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & test (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Le daemon doit être compilé en premier : son build déploie les binaires
      # natifs Windows (kraken.dll, DirectXTexNet.dll, opus-tools).
      - name: Build daemon
        run: dotnet build src/WolvenKitDaemon -c Release --nologo

      - name: Build serveur MCP
        run: dotnet build src/WolvenKitMcp -c Release --nologo

      - name: Tests unitaires
        run: dotnet test src/WolvenKitMcp.Tests -c Release --nologo --verbosity normal

      # Vérifie que le bundle d'extension Desktop se construit sans erreur.
      - name: Build .mcpb
        run: pwsh ./build-mcpb.ps1 -Configuration Release

      # Un bundle qui se construit n'est pas forcément un bundle valide : on le
      # dézippe et on vérifie manifest + entry points + binaires natifs + mod Lua.
      - name: Valider le bundle .mcpb
        shell: pwsh
        run: |
          $zip  = "dist/wolvenkit-mcp.mcpb"
          $dest = "obj/mcpb-verify"
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          [System.IO.Compression.ZipFile]::ExtractToDirectory((Resolve-Path $zip), $dest)
          $manifest = Get-Content "$dest/manifest.json" -Raw | ConvertFrom-Json
          if (-not $manifest.name)    { throw "manifest.json : champ name absent" }
          if (-not $manifest.version) { throw "manifest.json : champ version absent" }
          $required = @(
            $manifest.server.entry_point,
            "daemon/WolvenKitDaemon.dll",
            "daemon/kraken.dll",
            "live-bridge/CETBridge/init.lua"
          )
          foreach ($p in $required) {
            if (-not (Test-Path (Join-Path $dest $p))) { throw "manquant dans le bundle : $p" }
          }
          $sizeMb = [Math]::Round((Get-Item $zip).Length / 1MB, 1)
          Write-Host "Bundle valide : v$($manifest.version), $sizeMb Mo"

      - name: Upload .mcpb
        uses: actions/upload-artifact@v4
        with:
          name: wolvenkit-mcp-mcpb
          path: dist/wolvenkit-mcp.mcpb
          if-no-files-found: error
